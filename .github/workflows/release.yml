name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Package & publish VSIX
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run compile

      - name: Package VSIX
        run: npx vsce package --out vswt.vsix

      - name: Attach VSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: vswt.vsix

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --packagePath vswt.vsix --pat "$VSCE_PAT"

      - name: Publish to Open VSX (community marketplace)
        if: env.OVSX_PAT != ''
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish vswt.vsix --pat "$OVSX_PAT"
